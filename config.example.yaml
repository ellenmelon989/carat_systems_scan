# Scan configuration for MPCVD 2D diagnostic scanner
# Fill in real values as hardware is confirmed.

scan:
  grid:
    x_range_mm: [0, 50]      # scan area boundary — set by calibrate_scan_area.py (jog to edges)
    y_range_mm: [0, 50]      # scan area boundary — set by calibrate_scan_area.py (jog to edges)
    wafer_center_mm: [25.0, 25.0]   # derived by calibrate_scan_area.py from the 4 edge positions
    step_size_mm: 2.0        # grid spacing in mm; valid range 1-11mm (see scan_params.py).
                              # nx/ny are DERIVED from this + the range above at scan time —
                              # not set directly. A zero-width range on one axis collapses
                              # that axis to a single point (line/point scan), automatically.
  scan_order: raster   # raster | serpentine
  dwell_time_s: 8.0     # per-point IR averaging duration; valid range 2-22s (see scan_params.py)
  settle_time_s: 0.5
  reference_point:
    enabled: true
    revisit_every_n_points: 25
    position: [0, 0]  # placeholder
  rehome:
    # Re-homes the motion axes periodically to reset open-loop position
    # drift (Newport picomotors have no encoder — error accumulates with
    # step count). Off by default; enable for long/high-point-count scans.
    enabled: false
    every_n_points: 200

motion:
  controller: newport_8742
  interface: usb            # "usb" or "ethernet"
  host: "192.168.100.2"     # only used when interface: ethernet — replace with actual IP
  usb_index: 0              # only used when interface: usb
  steps_per_mm_x: 500       # fill in after calibration
  steps_per_mm_y: 500       # fill in after calibration
  # Calibration must be run at move_velocity below (open-loop step size is
  # velocity-dependent) — re-run calibration if move_velocity changes.
  calibration_date: null           # fill in: date steps_per_mm was measured
  calibration_velocity_sps: null   # fill in: velocity used during calibration (should match move_velocity)
  calibration_direction: null      # fill in: "+x"/"-x"/"+y"/"-y" — hysteresis makes direction matter
  home_velocity: 200        # steps/s during homing (slow, avoids crashing into hard stop)
  home_steps: 100000         # max steps driven toward the hard stop during a hard home.
                              # Blind guess for now — calibrate_scan_area.py can suggest a
                              # tighter, calibration-derived bound once steps_per_mm_x/y
                              # (below) are for real, not the placeholder.
  home_timeout_s: 300        # bumped from the 60s code default (2026-07-11): at
                              # home_velocity=200 steps/s, 60s only covers 12,000 steps —
                              # less than home_steps=100000 — so home() was timing out
                              # before ever reaching the real hard stop. 300s gives ~60,000
                              # steps of headroom at this velocity. Once steps_per_mm and
                              # home_steps are calibrated for real, both this and
                              # home_velocity can likely come back down.
  move_velocity: 2000       # steps/s during scan moves — calibrate steps_per_mm at THIS velocity
  axis_x: 1
  axis_y: 2
  homing_required: true
  soft_limits:
    x_min_mm: 0
    x_max_mm: 50
    y_min_mm: 0
    y_max_mm: 50

ir:
  source: pac          # pac | mock — REST/PAC is the only real backend wired up
                        # (direct-tap/OptoMMP fallbacks exist as prototypes in the
                        # older "carat system" folder but aren't ported in here;
                        # decided 2026-07-11 that we only need REST for now)
  pac:
    ip: ""           # confirm on-site
    tag_name: "iai_PYRO_TEMP"      # confirm via PAC Display Basic
    api_key_id: "carat_scanner"
    api_key_value: ""
  # averaging_time_s removed — superseded by scan.dwell_time_s (single operator-facing knob)
  units: C

oes:
  backend: mock        # mock | pyseabreeze
  integration_time_us: 20000
  num_averages: 3
  boxcar_width: 2
  features:
    CH: 431.0
    C2_Swan: 516.0
    H_alpha: 656.3
    H_beta: 486.1
  feature_window_nm: 1.0

error_policy:
  max_retries: 2
  on_failure: nan_and_flag   # nan_and_flag | abort

output:
  base_dir: ./scan_data
  spectra_subdir: spectra
  summary_csv: scan_summary.csv
  metadata_file: metadata.yaml
  log_file: scan_log.txt

metadata:
  operator: null
  reactor_run_number: null
  calibration_notes: null
